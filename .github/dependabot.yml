version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 10
    reviewers:
      - 'khemendra'
    labels:
      - 'dependencies'
      - 'dependabot'
    ignore:
      - dependency-name: 'next'
        update-types: ['version-update:semver-major']
